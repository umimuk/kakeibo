<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>カレンダー - かけいぼ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --teal: #14b8a6;
      --teal-dark: #0d9488;
      --teal-light: #ccfbf1;
      --bg: #f0fafa;
      --white: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --expense: #f97316;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans JP', 'Segoe UI', sans-serif;
      font-size: 16px;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--white);
      position: relative;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ===== Header ===== */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .month-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
      transition: all 0.2s;
    }

    .month-btn:active {
      background: var(--teal-light);
      border-color: var(--teal);
    }

    /* ===== Content ===== */
    .content {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }

    /* ===== Calendar ===== */
    .calendar-container {
      margin-bottom: 32px;
    }

    .weekday-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 8px;
    }

    .weekday {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 8px 0;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 24px;
    }

    .calendar-day {
      aspect-ratio: 1;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      font-size: 12px;
      transition: all 0.2s;
      position: relative;
    }

    .calendar-day:active {
      background: var(--teal-light);
      border-color: var(--teal);
    }

    .calendar-day.has-expense {
      background: #fff7ed;
    }

    .calendar-day.today {
      background: var(--teal-light);
      border-color: var(--teal);
      font-weight: 600;
    }

    .calendar-day.today .day-num {
      color: var(--teal-dark);
    }

    .calendar-day.other-month {
      color: var(--text-muted);
      opacity: 0.5;
    }

    .day-num {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .day-amount {
      font-size: 10px;
      color: var(--expense);
      font-weight: 600;
      word-break: break-all;
    }

    /* ===== Summary ===== */
    .summary {
      background: var(--bg);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: center;
    }

    .summary-label {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .summary-amount {
      font-size: 28px;
      font-weight: 700;
      color: var(--expense);
    }

    /* ===== Detail Panel ===== */
    .detail-panel {
      display: none;
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 16px;
      max-height: 50vh;
      overflow-y: auto;
    }

    .detail-panel.active {
      display: block;
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .detail-date {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .detail-close {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0;
    }

    .expense-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .expense-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: var(--bg);
      border-radius: 6px;
    }

    .expense-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .expense-category {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .expense-description {
      font-size: 13px;
      color: var(--text);
    }

    .expense-amount {
      font-size: 14px;
      font-weight: 600;
      color: var(--expense);
    }

    .no-expense {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--teal-light);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading-screen"><div class="spinner"></div></div>
  <div id="app">
    <div class="header">
      <div class="header-left">
        <button class="back-btn" onclick="location.href='index.html'">←</button>
        <div class="header-title">📅 カレンダー</div>
      </div>
      <div class="month-nav">
        <button class="month-btn" onclick="prevMonth()">◀</button>
        <button class="month-btn" onclick="nextMonth()">▶</button>
      </div>
    </div>

    <div class="content">
      <div class="calendar-container">
        <div id="calendar"></div>
        <div class="summary">
          <div class="summary-label">今月の合計支出</div>
          <div class="summary-amount">¥<span id="monthly-total">0</span></div>
        </div>
      </div>
    </div>

    <div class="detail-panel" id="detail-panel">
      <div class="detail-header">
        <div class="detail-date" id="detail-date"></div>
        <button class="detail-close" onclick="closeDetail()">×</button>
      </div>
      <div id="detail-list"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://bmlwitukylqgffzfuouv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtbHdpdHVreWxxZ2ZmemZ1b3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0Mjc2MjAsImV4cCI6MjA5MjAwMzYyMH0.qDpRnBzYUonlW-v0txxBPSSmEg1iFR7nv2ChnV_4xpQ';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentDate = new Date();
    let expenses = {};

    async function init() {
      try {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) {
          location.href = 'login.html';
          return;
        }

        await loadExpenses();
        renderCalendar();
      } catch (err) {
        console.error(err);
        location.href = 'login.html';
      } finally {
        document.getElementById('loading-screen').style.display = 'none';
      }
    }

    async function loadExpenses() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth() + 1;
      const monthStart = `${year}-${String(month).padStart(2, '0')}-01`;
      const monthEnd = new Date(year, month, 0);
      const monthEndStr = `${year}-${String(month).padStart(2, '0')}-${String(monthEnd.getDate()).padStart(2, '0')}`;

      const { data, error } = await sb
        .from('daily_expense')
        .select('*')
        .gte('date', monthStart)
        .lte('date', monthEndStr);

      if (error) {
        console.error(error);
        return;
      }

      expenses = {};
      data.forEach(row => {
        if (!expenses[row.date]) {
          expenses[row.date] = { total: 0, items: [] };
        }
        expenses[row.date].total += row.amount;
        expenses[row.date].items.push(row);
      });
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startDate = new Date(firstDay);
      startDate.setDate(startDate.getDate() - firstDay.getDay());

      let html = '<div class="weekday-header">';
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      days.forEach(d => {
        html += `<div class="weekday">${d}</div>`;
      });
      html += '</div>';

      html += '<div class="calendar-grid">';
      const today = new Date();
      let current = new Date(startDate);

      for (let i = 0; i < 42; i++) {
        const dateStr = current.toISOString().split('T')[0];
        const isToday = current.toDateString() === today.toDateString();
        const isCurrentMonth = current.getMonth() === month;
        const hasExpense = expenses[dateStr] && expenses[dateStr].total > 0;

        let className = 'calendar-day';
        if (!isCurrentMonth) className += ' other-month';
        if (isToday) className += ' today';
        if (hasExpense) className += ' has-expense';

        const amount = expenses[dateStr]?.total || 0;
        const amountStr = amount > 0 ? `¥${amount.toLocaleString()}` : '';

        html += `<div class="${className}" onclick="showDetail('${dateStr}')">
          <div class="day-num">${current.getDate()}</div>
          ${amountStr ? `<div class="day-amount">${amountStr}</div>` : ''}
        </div>`;

        current.setDate(current.getDate() + 1);
      }
      html += '</div>';

      document.getElementById('calendar').innerHTML = html;

      const monthTotal = Object.values(expenses).reduce((sum, e) => sum + e.total, 0);
      document.getElementById('monthly-total').textContent = monthTotal.toLocaleString();
    }

    function showDetail(dateStr) {
      const exp = expenses[dateStr];
      if (!exp || exp.items.length === 0) {
        document.getElementById('detail-list').innerHTML = '<div class="no-expense">この日の支出はありません</div>';
      } else {
        let html = '<div class="expense-list">';
        exp.items.forEach(item => {
          html += `<div class="expense-item">
            <div class="expense-info">
              <div class="expense-category">${item.category}</div>
              ${item.description ? `<div class="expense-description">${item.description}</div>` : ''}
            </div>
            <div class="expense-amount">¥${item.amount.toLocaleString()}</div>
          </div>`;
        });
        html += '</div>';
        document.getElementById('detail-list').innerHTML = html;
      }

      const dateObj = new Date(dateStr + 'T00:00:00');
      document.getElementById('detail-date').textContent = `${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;
      document.getElementById('detail-panel').classList.add('active');

      const content = document.querySelector('.content');
      content.style.overflow = 'hidden';
    }

    function closeDetail() {
      document.getElementById('detail-panel').classList.remove('active');
      const content = document.querySelector('.content');
      content.style.overflow = 'auto';
    }

    function prevMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      loadExpenses().then(() => renderCalendar());
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      loadExpenses().then(() => renderCalendar());
    }

    init();
  </script>
</body>
</html>
